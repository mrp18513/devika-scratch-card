<script>

let sec = 15;

let timer = setInterval(function(){

sec--;

document.getElementById("count").innerHTML = sec;

if(sec <= 0){

clearInterval(timer);

document.getElementById("scratchArea").style.display = "block";

generateOffer();

setupScratch();

}

},1000);

function generateOffer(){

let random = Math.random();
let reward = "";

if(random < 0.10){

reward = "🏆 ₹200 OFF<br>Coupon: DEVIKA200";

}
else if(random < 0.70){

reward = "🎁 ₹100 OFF<br>Coupon: DEVIKA100";

}
else if(random < 0.90){

reward = "💥 2% OFF<br>Coupon: DEVIKA2";

}
else{

reward = "😔 Best Of Luck Next Time<br><small>Follow Us For More Offers</small>";

}

document.getElementById("offer").innerHTML = reward;

}

function setupScratch(){

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

ctx.fillStyle = "#888";
ctx.fillRect(0,0,320,180);

ctx.fillStyle = "#fff";
ctx.font = "bold 24px Arial";
ctx.fillText("SCRATCH HERE",65,95);

let down = false;

function scratch(x,y){

if(!down) return;

ctx.globalCompositeOperation = "destination-out";

ctx.beginPath();
ctx.arc(x,y,25,0,Math.PI*2);
ctx.fill();

}

canvas.addEventListener("mousedown",()=>down=true);
canvas.addEventListener("mouseup",()=>down=false);

canvas.addEventListener("mousemove",(e)=>{
const rect = canvas.getBoundingClientRect();
scratch(
e.clientX-rect.left,
e.clientY-rect.top
);
});

canvas.addEventListener("touchstart",()=>down=true);
canvas.addEventListener("touchend",()=>down=false);

canvas.addEventListener("touchmove",(e)=>{
const rect = canvas.getBoundingClientRect();
scratch(
e.touches[0].clientX-rect.left,
e.touches[0].clientY-rect.top
);
});

}

</script>
